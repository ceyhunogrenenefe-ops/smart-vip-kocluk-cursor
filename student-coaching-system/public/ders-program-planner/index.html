<style>
  :root{
    --bg:#F3F4F8; --surface:#FFFFFF; --surface-2:#FAFBFD;
    --ink:#1A1D26; --muted:#697086; --faint:#9AA1B4;
    --line:#E4E7EF; --line-strong:#D2D7E3;
    --primary:#2E4C8C; --primary-deep:#233A6B; --primary-soft:#EAEFF9;
    --brand-navy:#1F478F; --brand-red:#FC3232; --brand-navy-soft:#E9F0FB;
    --danger:#D64545; --danger-soft:#FBECEC;
    --ok:#1F8A5B; --ok-soft:#E7F4EE;
    --warn:#B7791F;
    --shadow:0 1px 2px rgba(26,29,38,.05), 0 6px 20px rgba(26,29,38,.06);
    --radius:13px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit}
  .app{max-width:1120px; margin:0 auto; padding:22px 20px 80px}

  /* Header */
  header.top{display:flex; align-items:flex-start; justify-content:space-between; gap:18px; flex-wrap:wrap; margin-bottom:18px}
  .brand h1{font-family:"Fraunces",serif; font-weight:600; font-size:26px; margin:0; letter-spacing:-.01em}
  .brand p{margin:4px 0 0; color:var(--muted); font-size:13.5px}
  .brandwrap{display:flex; align-items:center; gap:16px; min-width:0}
  .logo{height:60px; width:auto; flex:none; display:block}
  @media (max-width:560px){ .logo{height:46px} .brand h1{font-size:22px} }
  .term{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:12px 16px; min-width:240px; box-shadow:var(--shadow);
  }
  .term .row{display:flex; align-items:center; justify-content:space-between; gap:12px}
  .term .dates{font-size:13px; color:var(--muted)}
  .term .dates b{color:var(--ink); font-weight:600}
  .term .cd{font-size:13px; font-weight:600; color:var(--primary)}
  .term .bar{height:6px; background:var(--line); border-radius:99px; margin-top:9px; overflow:hidden}
  .term .bar i{display:block; height:100%; background:var(--primary); border-radius:99px; width:0}

  .toolbar{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap}

  /* Buttons */
  .btn{display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line-strong);
    background:var(--surface); color:var(--ink); border-radius:10px; padding:9px 14px;
    font-size:13.5px; font-weight:500; cursor:pointer; min-height:40px; transition:background .15s,border-color .15s,transform .05s}
  .btn:hover{background:var(--surface-2); border-color:var(--muted)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--primary); outline-offset:2px}
  .btn.primary{background:var(--primary); border-color:var(--primary); color:#fff}
  .btn.primary:hover{background:var(--primary-deep)}
  .btn.ghost{border-color:transparent; background:transparent; color:var(--muted)}
  .btn.ghost:hover{background:var(--surface-2); color:var(--ink)}
  .btn.sm{min-height:32px; padding:5px 10px; font-size:12.5px; border-radius:8px}
  .btn.danger{color:var(--danger); border-color:var(--danger-soft)}
  .btn.danger:hover{background:var(--danger-soft); border-color:var(--danger)}
  .icon{width:16px; height:16px; flex:none}

  /* Tabs */
  nav.tabs{display:flex; gap:4px; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:5px; box-shadow:var(--shadow); margin-bottom:20px; overflow-x:auto}
  nav.tabs button{flex:1; min-width:max-content; border:none; background:transparent; color:var(--muted);
    padding:10px 16px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap}
  nav.tabs button.active{background:var(--primary-soft); color:var(--primary-deep)}
  nav.tabs button:focus-visible{outline:2px solid var(--primary); outline-offset:1px}

  /* Cards / grid */
  .grid{display:grid; gap:16px}
  .groups-grid{grid-template-columns:repeat(auto-fill, minmax(300px, 1fr))}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
  .gcard{overflow:hidden}
  .gcard .head{padding:14px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line)}
  .swatch{width:10px; height:34px; border-radius:5px; flex:none}
  .gcard .title{flex:1; min-width:0}
  .gcard .title .gname{font-weight:600; font-size:15.5px; background:transparent; width:100%; color:var(--ink); padding:3px 6px; border:1px solid transparent; border-radius:7px; transition:border-color .15s, background .15s; cursor:text}
  .gcard .title .gname:hover{border-color:var(--line-strong); background:var(--surface-2)}
  .gcard .title .gname:focus{outline:none; border-color:var(--primary); background:#fff}
  .gcard .body{padding:14px 16px}
  .field{margin-bottom:14px}
  .field label{display:block; font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; margin-bottom:5px}
  .inp{width:100%; border:1px solid var(--line-strong); border-radius:9px; padding:9px 11px; font-size:14px; color:var(--ink); background:var(--surface)}
  .inp:focus-visible{outline:2px solid var(--primary); outline-offset:0; border-color:var(--primary)}
  .students{margin-top:6px}
  .scount{font-size:11.5px; color:var(--muted); font-weight:600; margin-bottom:6px}
  .stu{display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--line); font-size:14px}
  .stu:last-child{border-bottom:none}
  .stu .num{font-size:12px; color:var(--faint); width:22px; flex:none; font-variant-numeric:tabular-nums}
  .stu .nm{flex:1}
  .stu .x{border:none; background:none; color:var(--faint); cursor:pointer; font-size:16px; line-height:1; padding:2px 6px; border-radius:6px}
  .stu .x:hover{color:var(--danger); background:var(--danger-soft)}
  .add-row{display:flex; gap:8px; margin-top:10px}
  .add-row .inp{flex:1}
  .empty{color:var(--faint); font-size:13px; font-style:italic; padding:8px 0}

  /* Timetable */
  .prog-head{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px}
  .gpills{display:flex; gap:7px; flex-wrap:wrap}
  .gpill{border:1px solid var(--line-strong); background:var(--surface); border-radius:99px; padding:7px 14px; font-size:13px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:7px}
  .gpill .d{width:9px; height:9px; border-radius:50%}
  .gpill.active{border-color:var(--ink); background:var(--ink); color:#fff}
  .gpill.active .d{box-shadow:0 0 0 2px rgba(255,255,255,.4)}
  .tt-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); box-shadow:var(--shadow)}
  table.tt{border-collapse:collapse; width:100%; min-width:720px}
  table.tt th, table.tt td{border:1px solid var(--line); padding:0; vertical-align:top}
  table.tt thead th{background:var(--surface-2); padding:10px 8px; font-size:12.5px; font-weight:600; color:var(--ink); position:sticky; top:0}
  table.tt .pcol{background:var(--surface-2); padding:10px; width:108px; text-align:left}
  table.tt .pcol .pl{font-weight:600; font-size:13px}
  table.tt .pcol .pt{font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums}
  .cell{display:block; width:100%; min-height:62px; border:none; background:transparent; text-align:left; padding:9px 10px; cursor:pointer; font-family:inherit}
  .cell:hover{background:var(--primary-soft)}
  .cell:focus-visible{outline:2px solid var(--primary); outline-offset:-2px}
  .cell .subj{font-weight:600; font-size:13.5px; color:var(--ink); display:block}
  .cell .tch{font-size:12.5px; color:var(--muted); display:flex; align-items:center; gap:4px; margin-top:2px}
  .cell .plus{color:var(--faint); font-size:20px; font-weight:400}
  .cell.conflict{background:var(--danger-soft)}
  .cell.conflict:hover{background:#F7DDDD}
  .cell.conflict .tch{color:var(--danger); font-weight:600}
  .cell .conf-with{display:block;font-size:10.5px;color:var(--danger);font-weight:600;margin-top:4px;line-height:1.3}
  .cell.has-lesson{cursor:grab}
  .cell.has-lesson:active{cursor:grabbing}
  .cell.dragging{opacity:.55}
  .cell.drag-over{background:var(--ok-soft); outline:2px dashed var(--ok); outline-offset:-2px}

  /* Master timetable (all classes) */
  .master-wrap{overflow:auto; border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); box-shadow:var(--shadow); max-height:calc(100vh - 220px)}
  table.master{border-collapse:collapse; min-width:100%; font-size:11px}
  table.master th, table.master td{border:1px solid var(--line); padding:0; vertical-align:middle; text-align:center}
  table.master thead th{background:var(--surface-2); font-weight:600; font-size:11px; padding:6px 4px; position:sticky; top:0; z-index:2}
  table.master thead tr.row2 th{top:28px; font-size:10px; color:var(--muted); font-weight:500; padding:4px 2px}
  table.master .gcol{position:sticky; left:0; z-index:3; background:var(--surface-2); min-width:140px; max-width:180px; text-align:left; padding:6px 10px; font-weight:600; font-size:12px; border-right:2px solid var(--line-strong)}
  table.master tbody .gcol{background:var(--surface); z-index:1}
  table.master .mcell{display:block; width:100%; min-width:52px; min-height:36px; border:none; background:transparent; cursor:pointer; padding:4px 3px; font-family:inherit; font-size:10px; line-height:1.25}
  table.master .mcell:hover{background:var(--primary-soft)}
  table.master .mcell .abbr{font-weight:700; color:var(--ink); display:block}
  table.master .mcell .mini{font-size:9px; color:var(--muted); display:block; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:64px}
  table.master .mcell.conflict{background:var(--danger-soft)}
  table.master .mcell.empty{color:var(--faint); font-size:14px}
  table.master .day-sep{border-left:2px solid var(--line-strong)}
  .shared-groups-list{display:flex; flex-direction:column; gap:6px; margin-top:8px; max-height:140px; overflow-y:auto}
  .shared-groups-list label{display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer}
  .master-tools{display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:12px}

  /* Conflicts tab */
  .conf-banner{display:flex; align-items:center; gap:10px; padding:13px 16px; border-radius:var(--radius); font-size:14px; font-weight:500; margin-bottom:16px}
  .conf-banner.ok{background:var(--ok-soft); color:var(--ok)}
  .conf-banner.bad{background:var(--danger-soft); color:var(--danger)}
  .conf-list{display:grid; gap:10px}
  .conf-item{display:flex; align-items:flex-start; gap:12px; padding:13px 15px}
  .conf-item .when{font-weight:600; font-size:13.5px; min-width:150px}
  .conf-item .who{flex:1}
  .conf-item .who .t{font-weight:600}
  .conf-item .who .g{color:var(--danger); font-size:13px; margin-top:2px}
  table.load{border-collapse:collapse; width:100%}
  table.load th,table.load td{text-align:left; padding:10px 14px; border-bottom:1px solid var(--line); font-size:14px}
  table.load th{font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted)}
  table.load td.n{text-align:right; font-variant-numeric:tabular-nums; font-weight:600}
  .section-title{font-family:"Fraunces",serif; font-size:18px; font-weight:600; margin:26px 0 12px}

  /* Settings */
  .set-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px}
  .chip-list{display:flex; flex-direction:column; gap:8px}
  .chip-row{display:flex; gap:8px; align-items:center}
  .chip-row .inp{flex:1}
  .chip-row .inp.t{max-width:130px}

  /* Modal */
  .scrim{position:fixed; inset:0; background:rgba(20,24,33,.5); display:none; align-items:center; justify-content:center; padding:20px; z-index:50}
  .scrim.show{display:flex}
  .modal{background:var(--surface); border-radius:16px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,.3); overflow:hidden}
  .modal .mh{padding:16px 18px; border-bottom:1px solid var(--line)}
  .modal .mh .mt{font-weight:600; font-size:16px}
  .modal .mh .ms{font-size:13px; color:var(--muted); margin-top:2px}
  .modal .mb{padding:18px}
  .modal .warn-box{display:none; background:var(--danger-soft); color:var(--danger); border-radius:9px; padding:10px 12px; font-size:13px; margin-top:4px; margin-bottom:6px}
  .modal .warn-box.show{display:block}
  .modal .mf{display:flex; gap:8px; padding:14px 18px; border-top:1px solid var(--line); background:var(--surface-2)}
  .modal .mf .btn{flex:1; justify-content:center}

  .hide{display:none !important}
  .tiny{font-size:12.5px; color:var(--muted)}

  /* PNG export sheet (rendered off-screen, captured by html2canvas) */
  .png-stage{position:fixed; left:-100000px; top:0; background:#fff; padding:34px; width:1180px}
  .png-sheet .ph{text-align:center; margin-bottom:18px; padding-bottom:14px; border-bottom:3px solid var(--brand-red)}
  .png-sheet .ph img{height:88px; width:auto; margin:0 auto 12px; display:block}
  .png-sheet .ph .tt{font-family:"Fraunces",serif; font-size:30px; font-weight:600; color:var(--brand-navy)}
  .png-sheet .ph .sb{color:var(--brand-red); font-weight:600; text-transform:uppercase; letter-spacing:.05em; font-size:14px; margin-top:5px}
  .png-sheet table{width:100%; border-collapse:collapse}
  .png-sheet th, .png-sheet td{border:1px solid #B9C4DA; padding:9px 11px; font-size:14px; text-align:left; vertical-align:top}
  .png-sheet thead th{background:var(--brand-navy); color:#fff; font-weight:600; border-color:var(--brand-navy)}
  .png-sheet .pcol{width:120px; background:var(--brand-navy-soft)}
  .png-sheet .pcol .pl{font-weight:600; color:var(--brand-navy)}
  .png-sheet .pcol .pt{color:#5C6B86; font-size:12px}
  .png-sheet .subj{font-weight:600; display:block; color:var(--brand-navy)}
  .png-sheet .tch{color:#444; font-size:12px; display:block; margin-top:3px}
  .png-sheet .cellh{height:54px}

  /* dedicated print sheet (hidden on screen) */
  #printSheet{display:none}
  @media print{
    body{background:#fff}
    .app{display:none !important}
    .scrim{display:none !important}
    #printSheet{display:block !important}
    .print-head{text-align:center; margin-bottom:16px; padding-bottom:12px; border-bottom:3px solid #FC3232}
    .print-logo{height:70px; width:auto; margin:0 auto 10px; display:block}
    .print-title{font-family:"Fraunces",serif; font-size:24px; font-weight:600; color:#1F478F}
    .print-sub{color:#FC3232; font-size:12.5px; margin-top:3px; letter-spacing:.04em; font-weight:600; text-transform:uppercase}
    table.print-tt{width:100%; border-collapse:collapse}
    table.print-tt th, table.print-tt td{border:1px solid #B9C4DA; padding:7px 8px; font-size:12px; vertical-align:top; text-align:left}
    table.print-tt thead th{background:#1F478F !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; font-weight:600; border-color:#1F478F}
    table.print-tt .pcol{width:90px; background:#E9F0FB !important; -webkit-print-color-adjust:exact; print-color-adjust:exact}
    table.print-tt .pcol .pl{font-weight:600; color:#1F478F}
    table.print-tt .pcol .pt{color:#5C6B86; font-size:11px}
    table.print-tt .pcell{height:46px}
    table.print-tt .subj{font-weight:600; display:block; color:#1F478F}
    table.print-tt .tch{color:#444; font-size:11px; display:block; margin-top:2px}
    .print-page{page-break-after:always}
    .print-page:last-child{page-break-after:auto}
    @page{ size:A4 landscape; margin:14mm }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<div class="app">

<script>
/* ---------------- storage (localStorage + in-memory fallback) ---------------- */
const KEY='yazDonemiSistemi.v1';
let MEM=null;
function loadState(){
  try{ const s=localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  if(MEM) return JSON.parse(MEM);
  return null;
}
function saveState(){
  const json=JSON.stringify(state);
  MEM=json;
  try{ localStorage.setItem(KEY,json); }catch(e){ /* sandbox: kept in memory only */ }
}
const uid=()=>'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ---------------- default data ---------------- */
const COLORS=['#2E4C8C','#0E8A6B','#B4541E','#7A3FA0','#C0392B','#1E7FA8'];
function defaultState(){
  const PERIODS=()=>[
    {label:'1. Ders', time:'09:00–09:45'},
    {label:'2. Ders', time:'10:00–10:45'},
    {label:'3. Ders', time:'11:00–11:45'},
    {label:'4. Ders', time:'12:00–12:45'},
    {label:'5. Ders', time:'13:30–14:15'},
    {label:'6. Ders', time:'14:30–15:15'},
  ];
  const mk=(name,color)=>({id:uid(), name, advisor:'', color, students:[], schedule:{}, periods:PERIODS()});
  return {
    term:{start:'2026-07-01', end:'2026-08-23'},
    days:['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'],
    periods:PERIODS(), // şablon (yeni sınıflar için varsayılan)
    groups:[
      mk('11 → 12 Grubu', COLORS[0]),
      mk('Göz Grubu', COLORS[1]),
      mk('YÖS (Yabancı Öğrenci) Grubu', COLORS[2]),
      mk('10 → 11 Grubu A', COLORS[3]),
      mk('10 → 11 Grubu B', COLORS[4]),
    ],
  };
}
let state=loadState() || defaultState();
/* migration: her sınıfa kendi ders saatleri */
if(!state.periods||!state.periods.length) state.periods=defaultState().periods;
state.groups.forEach(g=>{ if(!Array.isArray(g.periods)||!g.periods.length){ g.periods=(state.periods||[]).map(p=>({label:p.label,time:p.time})); } });
let tab='master';
let activeGroupId=state.groups[0] ? state.groups[0].id : null;
let editingCell=null; // {groupId, key}
let importTargetGroup=null;
let showPeriods=false; // per-class period editor toggle

/* undo + drag (ders programı) */
const UNDO_MAX=50;
let undoStack=[];
let dragLesson=null; // {groupId, key}
let suppressCellClick=false;

function snapshotSchedules(){
  return state.groups.map(g=>({id:g.id, schedule:JSON.parse(JSON.stringify(g.schedule||{}))}));
}
function pushUndo(){
  undoStack.push(snapshotSchedules());
  if(undoStack.length>UNDO_MAX) undoStack.shift();
  updateUndoBtn();
}
function undoSchedule(){
  if(!undoStack.length) return;
  const snap=undoStack.pop();
  snap.forEach(({id,schedule})=>{ const g=group(id); if(g) g.schedule=schedule; });
  saveState(); render();
}
function updateUndoBtn(){
  const btn=$('#undoBtn');
  if(btn) btn.disabled=undoStack.length===0;
}
function cellHasLesson(v){ return !!(v&&(v.subject||v.teacher)); }
function subjectAbbr(subject){
  const s=String(subject||'').trim();
  if(!s) return '—';
  const map={'MATEMATİK':'MAT','MATEMATIK':'MAT','GEOMETRİ':'GEO','GEOMETRI':'GEO','FİZİK':'FİZ','FIZIK':'FİZ','KİMYA':'KİM','KIMYA':'KİM','BİYOLOJİ':'BİY','BIYOLOJI':'BİY','TÜRKÇE':'TRK','TURKCE':'TRK','EDEBİYAT':'EDB','EDEBIYAT':'EDB','TARİH':'TRH','TARIH':'TRH','COĞRAFYA':'COĞ','COGRAFYA':'COĞ','REHBERLİK':'REH','REHBERLIK':'REH','DENEME':'DNM'};
  const u=s.toLocaleUpperCase('tr-TR');
  if(map[u]) return map[u];
  if(s.length<=5) return u;
  return u.replace(/[^A-ZÇĞİÖŞÜa-zçğıöşü0-9]/g,'').slice(0,4).toLocaleUpperCase('tr-TR')||u.slice(0,4);
}
function masterPeriods(){ return state.periods&&state.periods.length ? state.periods : (state.groups[0]?.periods||[]); }
/** Master ızgarasındaki gün/saat → grubun schedule anahtarı (sınıfa özel ders saatlerine göre eşleşir). */
function groupKeyForMasterSlot(g, di, masterPi){
  const mPer=masterPeriods()[masterPi];
  if(!mPer) return null;
  const gPer=g.periods||state.periods||[];
  const mRange=parseRange(mPer.time);
  if(gPer[masterPi]){
    const gr=parseRange(gPer[masterPi].time);
    if(!mRange||!gr||rangesOverlap(mRange,gr)||norm(gPer[masterPi].time)===norm(mPer.time)) return di+'_'+masterPi;
  }
  for(let pi=0; pi<gPer.length; pi++){
    const gr=parseRange(gPer[pi].time);
    if(mRange&&gr&&rangesOverlap(mRange,gr)) return di+'_'+pi;
    if(norm(gPer[pi].time||'')===norm(mPer.time||'')) return di+'_'+pi;
  }
  if(gPer[masterPi]) return di+'_'+masterPi;
  return null;
}
function lessonAtMasterSlot(g, di, masterPi){
  const key=groupKeyForMasterSlot(g, di, masterPi);
  if(!key) return {key:null, cell:null};
  return {key, cell:g.schedule[key]||null};
}
function applyLessonTransfer(groupId, fromKey, toKey){
  const g=group(groupId);
  if(!g||fromKey===toKey) return false;
  const from=g.schedule[fromKey];
  if(!cellHasLesson(from)) return false;
  pushUndo();
  const to=g.schedule[toKey];
  const fromCopy={teacher:String(from.teacher||''), subject:String(from.subject||'')};
  if(cellHasLesson(to)){
    g.schedule[fromKey]={teacher:String(to.teacher||''), subject:String(to.subject||'')};
    g.schedule[toKey]=fromCopy;
  }else{
    g.schedule[toKey]=fromCopy;
    delete g.schedule[fromKey];
  }
  saveState();
  return true;
}

/* time helpers for time-based conflict detection */
function parseRange(t){
  const m=(t||'').match(/(\d{1,2}):(\d{2})/g);
  if(!m||m.length<2) return null;
  const toMin=s=>{const a=s.split(':'); return (+a[0])*60+(+a[1]);};
  let s=toMin(m[0]), e=toMin(m[1]); if(e<=s) e+=24*60;
  return [s,e];
}
function rangesOverlap(a,b){ return a[0]<b[1] && b[0]<a[1]; }

/* ---------------- helpers ---------------- */
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const norm=s=>(s||'').trim().toLocaleLowerCase('tr-TR');
function group(id){ return state.groups.find(g=>g.id===id); }
function allTeachers(){
  const set=new Map();
  state.groups.forEach(g=>Object.values(g.schedule).forEach(v=>{ if(v&&v.teacher){const t=v.teacher.trim(); if(t&&!set.has(norm(t))) set.set(norm(t),t);} }));
  return [...set.values()].sort((a,b)=>a.localeCompare(b,'tr'));
}
function allSubjects(){
  const set=new Map();
  state.groups.forEach(g=>Object.values(g.schedule).forEach(v=>{ if(v&&v.subject){const t=v.subject.trim(); if(t&&!set.has(norm(t))) set.set(norm(t),t);} }));
  return [...set.values()].sort((a,b)=>a.localeCompare(b,'tr'));
}
/* time-based conflict: same teacher, same day, overlapping time across classes */
function conflictData(){
  const items=[];
  state.groups.forEach(g=>{
    const per=g.periods||state.periods||[];
    Object.entries(g.schedule).forEach(([k,v])=>{
      if(!v||!v.teacher) return;
      const [di,pi]=k.split('_').map(Number);
      const p=per[pi]; if(!p) return;
      items.push({gid:g.id, gname:g.name, key:k, di, tn:norm(v.teacher), td:v.teacher.trim(),
                  range:parseRange(p.time), ptime:p.time||'', plabel:p.label});
    });
  });
  const conflictCells=new Set(); // `${gid}|${key}`
  const conflictMap={}; // `${gid}|${key}` -> [{gname, when}]
  const addConflictPartner=(A,B)=>{
    const push=(cellKey, partner)=>{
      if(!conflictMap[cellKey]) conflictMap[cellKey]=[];
      const sig=partner.gname+'\0'+(partner.when||'');
      if(conflictMap[cellKey].some(x=>x.gname===partner.gname&&(x.when||'')===(partner.when||''))) return;
      conflictMap[cellKey].push(partner);
    };
    push(A.gid+'|'+A.key, {gname:B.gname, when:B.ptime||B.plabel});
    push(B.gid+'|'+B.key, {gname:A.gname, when:A.ptime||A.plabel});
  };
  for(let i=0;i<items.length;i++){
    for(let j=i+1;j<items.length;j++){
      const A=items[i], B=items[j];
      if(A.tn!==B.tn || A.di!==B.di) continue;
      if(A.gid===B.gid && A.key===B.key) continue;
      let clash;
      if(A.range&&B.range) clash=rangesOverlap(A.range,B.range);
      else if(A.ptime&&B.ptime) clash=norm(A.ptime)===norm(B.ptime);
      else clash=A.plabel===B.plabel;
      if(clash){
        conflictCells.add(A.gid+'|'+A.key);
        conflictCells.add(B.gid+'|'+B.key);
        addConflictPartner(A,B);
      }
    }
  }
  // group flagged items into readable conflict rows (per day + teacher)
  const grp={};
  items.forEach(it=>{
    if(!conflictCells.has(it.gid+'|'+it.key)) return;
    const rk=it.di+'|'+it.tn;
    grp[rk]=grp[rk]||{di:it.di, teacher:it.td, entries:[]};
    grp[rk].entries.push({gname:it.gname, when:it.ptime||it.plabel});
  });
  const conflicts=Object.values(grp);
  return {conflicts, conflictCells, conflictMap};
}
function teacherLoad(){
  const load={};
  state.groups.forEach(g=>Object.values(g.schedule).forEach(v=>{ if(v&&v.teacher){const t=v.teacher.trim(); if(t){const k=norm(t); load[k]=load[k]||{display:t,count:0}; load[k].count++;} }}));
  return Object.values(load).sort((a,b)=>b.count-a.count);
}
function fmtDate(iso){
  if(!iso) return '—';
  const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return iso;
  return d.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
}

/* ---------------- render: header term ---------------- */
function renderTerm(){
  const box=$('#termBox');
  const s=new Date(state.term.start+'T00:00:00'), e=new Date(state.term.end+'T00:00:00');
  const now=new Date(); now.setHours(0,0,0,0);
  let cd='', pct=0;
  if(!isNaN(s)&&!isNaN(e)){
    const total=Math.max(1,Math.round((e-s)/864e5));
    if(now<s){ const d=Math.round((s-now)/864e5); cd='Başlamasına '+d+' gün'; pct=0; }
    else if(now>e){ cd='Dönem tamamlandı'; pct=100; }
    else { const done=Math.round((now-s)/864e5); cd=done+' / '+total+' gün'; pct=Math.round(done/total*100); }
  }
  box.innerHTML=`
    <div class="row">
      <div class="dates"><b>${fmtDate(state.term.start)}</b> – <b>${fmtDate(state.term.end)}</b></div>
      <div class="cd">${cd}</div>
    </div>
    <div class="bar"><i style="width:${pct}%"></i></div>`;
}

/* ---------------- render: tabs ---------------- */
function renderTabs(){
  const {conflicts}=conflictData();
  const items=[
    ['master','Tüm Sınıflar'],
    ['gruplar','Gruplar & Öğrenciler'],
    ['program','Ders Programı (tek sınıf)'],
    ['cakisma','Çakışmalar'+(conflicts.length?' ('+conflicts.length+')':'')],
    ['ayarlar','Ayarlar'],
  ];
  $('#tabs').innerHTML=items.map(([k,l])=>`<button data-tab="${k}" class="${tab===k?'active':''}">${l}</button>`).join('');
}

/* ---------------- render: groups ---------------- */
function renderGruplar(){

  const html=`

    </div>
    <div class="grid groups-grid">
    ${state.groups.map(g=>`
      <div class="card gcard" data-gid="${g.id}">
        <div class="head">
          <span class="swatch" style="background:${g.color}"></span>
          <div class="title"><input class="gname" data-field="name" value="${esc(g.name)}" aria-label="Grup adı" title="Grup adını düzenlemek için tıklayın"></div>

          <button class="btn ghost sm" data-act="del-group" aria-label="Grubu sil" title="Grubu sil"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
        </div>
        <div class="body">
          <div class="field">

            </div>
            ${g.students.length? g.students.map((s,i)=>`

              </div>`).join('') : '<div class="empty">Henüz öğrenci yok.</div>'}
            <div class="add-row">
              <input class="inp" data-act="student-input" placeholder="Öğrenci adı ekle…" aria-label="Öğrenci adı">
              <button class="btn sm" data-act="add-student">Ekle</button>
            </div>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
  $('#view').innerHTML=html;
}

/* ---------------- render: master (all classes) ---------------- */
function renderMaster(){
  const per=masterPeriods();
  const {conflictCells}=conflictData();
  if(!state.groups.length){
    $('#view').innerHTML='<div class="empty">Önce Grup ekleyin.</div>';
    return;
  }
  const dayHeaders=state.days.map((d,di)=>{
    const cls=di>0?' day-sep':'';
    return `<th colspan="${per.length}" class="${cls.trim()}">${esc(d)}</th>`;
  }).join('');
  const periodHeaders=state.days.map((d,di)=>{
    return per.map((p,pi)=>{
      const cls=(di>0&&pi===0?' day-sep':'')+(pi===0?'':'');
      const t=String(p.time||'').split('–')[0]||String(pi+1);
      return `<th class="${cls.trim()}" title="${esc(p.label+' '+p.time)}">${esc(t)}</th>`;
    }).join('');
  }).join('');
  const rows=state.groups.map(g=>{
    const cells=state.days.map((d,di)=> per.map((p,pi)=>{
      const {key, cell}=lessonAtMasterSlot(g, di, pi);
      const conf=cell&&cell.teacher&&key&&conflictCells.has(g.id+'|'+key);
      const has=cellHasLesson(cell);
      const inner=has
        ? `<span class="abbr">${esc(subjectAbbr(cell.subject))}</span><span class="mini">${esc(cell.teacher||'')}</span>`
        : '·';

/* ---------------- modal ---------------- */
function openCellEditor(groupId,key,masterDi=null,masterPi=null){
  editingCell={groupId,key,masterDi,masterPi};
  const g=group(groupId); const v=g.schedule[key]||{};
  const [di,pi]=key.split('_').map(Number);
  const per=(g.periods||state.periods)[pi]||masterPeriods()[pi]||{label:'',time:''};
  $('#mSub').textContent=`${g.name} · ${state.days[di]} · ${per.label} ${per.time||''}`;
  $('#teacherList').innerHTML=allTeachers().map(t=>`<option value="${esc(t)}">`).join('');
  $('#subjectList').innerHTML=allSubjects().map(t=>`<option value="${esc(t)}">`).join('');
  $('#mTeacher').value=v.teacher||'';
  $('#mSubject').value=v.subject||'';
  const sharedWrap=$('#mSharedWrap');
  const sharedList=$('#mSharedGroups');
  if(state.groups.length>1){
    sharedWrap.style.display='block';
    $('#mShared').checked=false;
    sharedList.innerHTML=state.groups.filter(x=>x.id!==groupId).map(x=>
      `<label><input type="checkbox" class="mSharedGroup" value="${x.id}"> ${esc(x.name)}</label>`
    ).join('');
  } else {
    sharedWrap.style.display='none';
    sharedList.innerHTML='';
  }
  checkModalConflict();
  $('#scrim').classList.add('show');
  setTimeout(()=>$('#mTeacher').focus(),30);
}
function closeModal(){ $('#scrim').classList.remove('show'); editingCell=null; }
function checkModalConflict(){
  if(!editingCell) return;
  const t=norm($('#mTeacher').value); const box=$('#mWarn');
  if(!t){ box.classList.remove('show'); return; }
  const eg=group(editingCell.groupId);
  const [edi,epi]=editingCell.key.split('_').map(Number);
  const eP=(eg.periods||state.periods)[epi]||{}; const eRange=parseRange(eP.time);
  const hits=[];
  state.groups.forEach(g=>{
    const per=g.periods||state.periods||[];
    Object.entries(g.schedule).forEach(([k,v])=>{
      if(g.id===editingCell.groupId && k===editingCell.key) return;
      if(!v||norm(v.teacher)!==t) return;
      const [di,pi]=k.split('_').map(Number);
      if(di!==edi) return;
      const p=per[pi]||{}; const r=parseRange(p.time);
      let clash = (eRange&&r)? rangesOverlap(eRange,r) : (eP.time&&p.time? norm(eP.time)===norm(p.time) : true);
      if(clash) hits.push('Sınıf: '+g.name+(p.time?(' · '+p.time):''));
    });
  });
  if(hits.length){ box.textContent='Dikkat: bu öğretmen aynı saatte şurada da var → '+hits.join(', '); box.classList.add('show'); }
  else box.classList.remove('show');
}
function saveCell(){
  if(!editingCell) return;
  const teacher=$('#mTeacher').value.trim(), subject=$('#mSubject').value.trim();
  const nextEmpty=!teacher && !subject;
  const [edi,epi]=editingCell.key.split('_').map(Number);
  const masterDi=editingCell.masterDi!=null?editingCell.masterDi:edi;
  const masterPi=editingCell.masterPi!=null?editingCell.masterPi:epi;
  const targets=[editingCell.groupId];
  if($('#mShared')?.checked){
    document.querySelectorAll('.mSharedGroup:checked').forEach(el=>targets.push(el.value));
  }
  const uniqueTargets=[...new Set(targets)];
  let anyChange=false;
  for(const gid of uniqueTargets){
    const g=group(gid);
    if(!g) continue;
    let key=gid===editingCell.groupId ? editingCell.key : groupKeyForMasterSlot(g, masterDi, masterPi);
    if(!key && !nextEmpty){
      key=masterDi+'_'+masterPi;
      if(!g.periods||!g.periods[masterPi]){
        g.periods=(g.periods||state.periods||[]).map(p=>({...p}));
        while(g.periods.length<=masterPi) g.periods.push({label:(g.periods.length+1)+'. Ders', time:(masterPeriods()[g.periods.length]?.time||'')});
      }
    }
    if(!key) continue;
    const prev=g.schedule[key];
    const prevEmpty=!cellHasLesson(prev);
    if(nextEmpty && prevEmpty) continue;
    const changed=nextEmpty!==prevEmpty || (!nextEmpty && (String(prev?.teacher||'')!==teacher || String(prev?.subject||'')!==subject));
    if(changed) anyChange=true;
    if(!teacher && !subject) delete g.schedule[key];
    else g.schedule[key]={teacher,subject};
  }
  if(anyChange) pushUndo();
  saveState(); closeModal(); render();
}
function clearCell(){
  if(!editingCell) return;
  const [edi,epi]=editingCell.key.split('_').map(Number);
  const masterDi=editingCell.masterDi!=null?editingCell.masterDi:edi;
  const masterPi=editingCell.masterPi!=null?editingCell.masterPi:epi;
  const targets=[editingCell.groupId];
  if($('#mShared')?.checked){
    document.querySelectorAll('.mSharedGroup:checked').forEach(el=>targets.push(el.value));
  }
  let any=false;
  for(const gid of [...new Set(targets)]){
    const g=group(gid);
    if(!g) continue;
    const key=gid===editingCell.groupId ? editingCell.key : groupKeyForMasterSlot(g, masterDi, masterPi);
    if(!key) continue;
    if(cellHasLesson(g.schedule[key])) any=true;
    delete g.schedule[key];
  }
  if(any) pushUndo();
  saveState(); closeModal(); render();
}

/* ---------------- events: clicks ---------------- */
document.addEventListener('click',e=>{
  const tabBtn=e.target.closest('[data-tab]');
  if(tabBtn){ tab=tabBtn.dataset.tab; render(); return; }
  const a=e.target.closest('[data-act]'); if(!a) return;
  const act=a.dataset.act;
  const card=a.closest('[data-gid]'); const gid=card?card.dataset.gid:null;

  switch(act){
    case 'add-group':{
      const c=COLORS[state.groups.length%COLORS.length];
      const ng={id:uid(),name:'Yeni Grup',advisor:'',color:c,students:[],schedule:{}};
      state.groups.push(ng); activeGroupId=ng.id; saveState(); render();
      break;}
    case 'del-group':{
      const g=group(gid);
      if(confirm(`"${g.name}" grubu ve içindeki tüm öğrenci/ders bilgileri silinsin mi?`)){
        state.groups=state.groups.filter(x=>x.id!==gid);
        if(activeGroupId===gid) activeGroupId=state.groups[0]?state.groups[0].id:null;
        saveState(); render();
      }
      break;}
    case 'add-student':{
      const inp=card.querySelector('[data-act="student-input"]');
      addStudent(gid,inp.value); inp.value='';
      break;}
    case 'del-student':{
      const g=group(gid); g.students=g.students.filter(s=>s.id!==a.dataset.sid); saveState(); render();
      break;}
    case 'pick-group':{ activeGroupId=a.dataset.gid; render(); break; }
    case 'edit-name':{ const inp=card.querySelector('.gname'); if(inp){ inp.focus(); inp.select(); } break; }
    case 'import-students':{ importTargetGroup=gid; $('#studentImportFile').click(); break; }
    case 'bulk-import':{ $('#bulkImportFile').click(); break; }
    case 'edit-master-cell':{
      if(suppressCellClick) break;
      const mgid=a.dataset.gid;
      const mdi=Number(a.dataset.di), mpi=Number(a.dataset.pi);
      const mg=group(mgid);
      const mkey=mg ? (groupKeyForMasterSlot(mg, mdi, mpi)||a.dataset.key) : a.dataset.key;
      openCellEditor(mgid, mkey, mdi, mpi);
      break;
    }
    case 'edit-cell':{
      if(suppressCellClick) break;
      openCellEditor(a.dataset.gid||activeGroupId,a.dataset.key);
      break;
    }
    case 'undo': undoSchedule(); break;
    case 'cell-save': saveCell(); break;
    case 'cell-clear': clearCell(); break;
    case 'cell-cancel': closeModal(); break;
    case 'day-add': state.days.push('Yeni Gün'); saveState(); render(); break;
    case 'day-del': pruneDay(parseInt(a.dataset.i)); break;
    case 'toggle-periods': showPeriods=!showPeriods; render(); break;
    case 'gper-add':{ const g=group(activeGroupId); g.periods=g.periods||[]; g.periods.push({label:(g.periods.length+1)+'. Ders',time:''}); saveState(); render(); break; }
    case 'gper-del':{ const g=group(activeGroupId); pruneGroupPeriod(g, parseInt(a.dataset.i)); break; }
    case 'gper-copy':{ copyPeriodsFromAnother(); break; }
    case 'export': exportJSON(); break;
    case 'import-trigger': $('#importFile').click(); break;
    case 'print': buildPrintSheet(); setTimeout(()=>window.print(),60); break;
    case 'export-png': exportPNG(); break;
    case 'reset-all':
      if(confirm('TÜM veriler silinip varsayılana dönülecek. Emin misiniz?')){ state=defaultState(); activeGroupId=state.groups[0].id; undoStack=[]; saveState(); render(); }
      break;
  }
});
function addStudent(gid,name){
  name=(name||'').trim(); if(!name) return;
  group(gid).students.push({id:uid(),name}); saveState(); render();
}
function pruneDay(i){
  state.days.splice(i,1);
  state.groups.forEach(g=>{
    const ns={};
    Object.entries(g.schedule).forEach(([k,v])=>{ let [di,pi]=k.split('_').map(Number); if(di===i) return; if(di>i) di--; ns[di+'_'+pi]=v; });
    g.schedule=ns;
  });
  saveState(); render();
}
function pruneGroupPeriod(g,i){
  g.periods.splice(i,1);
  const ns={};
  Object.entries(g.schedule).forEach(([k,v])=>{ let [di,pi]=k.split('_').map(Number); if(pi===i) return; if(pi>i) pi--; ns[di+'_'+pi]=v; });
  g.schedule=ns;
  saveState(); render();
}
function copyPeriodsFromAnother(){
  const g=group(activeGroupId);
  const others=state.groups.filter(x=>x.id!==g.id);
  if(!others.length) return;
  const msg='Hangi sınıfın ders saatlerini kopyalayalım?\n\n'+others.map((x,i)=>(i+1)+') '+x.name).join('\n')+'\n\nNumara girin:';
  const ans=prompt(msg);
  const idx=parseInt(ans)-1;
  if(isNaN(idx)||idx<0||idx>=others.length) return;
  if(Object.keys(g.schedule).length && !confirm('Bu sınıfın mevcut ders saatleri değişecek (atanmış dersler etkilenebilir). Devam edilsin mi?')) return;
  g.periods=others[idx].periods.map(p=>({label:p.label,time:p.time}));
  // drop schedule entries pointing to periods that no longer exist
  const max=g.periods.length;
  const ns={};
  Object.entries(g.schedule).forEach(([k,v])=>{ const [di,pi]=k.split('_').map(Number); if(pi<max) ns[k]=v; });
  g.schedule=ns;
  saveState(); render();
}

  if(a.dataset.act==='gper-label'){ const g=group(activeGroupId); g.periods[+a.dataset.i].label=a.value; saveState(); }
  if(a.dataset.act==='gper-time'){ const g=group(activeGroupId); g.periods[+a.dataset.i].time=a.value; saveState(); }
  if(a.id==='importFile'){ importJSON(a.files[0]); a.value=''; }
  if(a.id==='studentImportFile'){ handleStudentFile(a.files[0]); a.value=''; }
  if(a.id==='bulkImportFile'){ handleBulkFile(a.files[0]); a.value=''; }
});
/* Enter to add student; live modal conflict check */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && e.target.dataset && e.target.dataset.act==='student-input'){
    const card=e.target.closest('[data-gid]'); addStudent(card.dataset.gid, e.target.value); e.target.value='';
  }
  if(e.key==='Escape' && $('#scrim').classList.contains('show')) closeModal();
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z' && !e.shiftKey && tab==='program' && !$('#scrim').classList.contains('show')){
    const tag=(e.target.tagName||'').toLowerCase();
    if(tag==='input'||tag==='textarea'||e.target.isContentEditable) return;
    e.preventDefault();
    undoSchedule();
  }
});
document.addEventListener('input',e=>{ if(e.target.id==='mTeacher') checkModalConflict(); });
$('#scrim').addEventListener('click',e=>{ if(e.target.id==='scrim') closeModal(); });

/* drag & drop: ders hücreleri */
document.addEventListener('dragstart',e=>{
  if(tab!=='program') return;
  const cell=e.target.closest('.cell.has-lesson');
  if(!cell||!activeGroupId) return;
  dragLesson={groupId:activeGroupId, key:cell.dataset.key};
  e.dataTransfer.effectAllowed='move';
  try{ e.dataTransfer.setData('text/plain', cell.dataset.key); }catch(err){}
  cell.classList.add('dragging');
});
document.addEventListener('dragend',e=>{
  const cell=e.target.closest('.cell');
  if(cell) cell.classList.remove('dragging');
  document.querySelectorAll('.cell.drag-over').forEach(c=>c.classList.remove('drag-over'));
  if(dragLesson){
    suppressCellClick=true;
    setTimeout(()=>{ suppressCellClick=false; }, 0);
  }
  dragLesson=null;
});
document.addEventListener('dragover',e=>{
  if(tab!=='program'||!dragLesson) return;
  const cell=e.target.closest('.cell');
  if(!cell) return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.cell.drag-over').forEach(c=>{ if(c!==cell) c.classList.remove('drag-over'); });
  cell.classList.add('drag-over');
});
document.addEventListener('dragleave',e=>{
  const cell=e.target.closest('.cell');
  if(cell && !cell.contains(e.relatedTarget)) cell.classList.remove('drag-over');
});
document.addEventListener('drop',e=>{
  if(tab!=='program'||!dragLesson) return;
  const cell=e.target.closest('.cell');
  if(!cell) return;
  e.preventDefault();
  cell.classList.remove('drag-over');
  const toKey=cell.dataset.key;
  if(applyLessonTransfer(dragLesson.groupId, dragLesson.key, toKey)) render();
  dragLesson=null;
});

  const logo=document.querySelector('.logo'); const logoSrc=logo?logo.getAttribute('src'):'';
  const per=g.periods||state.periods||[];

    <td class="pcol"><div class="pl">${esc(p.label)}</div><div class="pt">${esc(p.time||'')}</div></td>
    ${state.days.map((d,di)=>{ const v=g.schedule[di+'_'+pi];
      const inner=(v&&(v.subject||v.teacher))?`<span class="subj">${esc(v.subject||'')}</span>${v.teacher?`<span class="tch">${esc(v.teacher)}</span>`:''}`:'';
      return `<td class="cellh">${inner}</td>`; }).join('')}
  </tr>`).join('');
  const stage=document.createElement('div'); stage.className='png-stage';

  document.body.appendChild(stage);
  try{

  }catch(e){ alert('PNG oluşturulamadı: '+(e.message||e)); }
  finally{ stage.remove(); }
}
/* CSV parser (delimiter auto: , ; tab; quote-aware) */
function parseCSV(text){
  text=text.replace(/\r\n?/g,'\n');
  const first=text.split('\n').find(l=>l.trim()!=='')||'';
  const cand=[',',';','\t'];
  const delim=cand.slice().sort((a,b)=>(first.split(b).length)-(first.split(a).length))[0];
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else if(c==='"') q=true;
    else if(c===delim){ row.push(cur); cur=''; }
    else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
    else cur+=c;
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
async function readRows(file){
  const n=file.name.toLowerCase();
  if(n.endsWith('.csv')||n.endsWith('.txt')) return parseCSV(await file.text());
  if(!window.XLSX) throw new Error('Excel okuyucu yüklenemedi (internet bağlantısı gerekiyor). Dosyayı Excel’de "CSV olarak kaydet" yapıp tekrar deneyebilirsiniz.');
  const wb=XLSX.read(await file.arrayBuffer(),{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''});
}
const isHeaderText=x=>/(^|\s)(ad|adı|adi|isim|soyad|öğrenci|ogrenci|name|grup|sınıf|sinif|no|sıra|sira|class)/.test(x);
/* names from a single-group file */
function extractNames(rows){
  if(!rows.length) return [];
  const h=(rows[0]||[]).map(c=>norm(String(c)));
  const hasHeader=h.some(isHeaderText);
  let start=0, cols=[0];
  if(hasHeader){
    start=1;
    const adi=h.findIndex(x=>/(ad|adı|adi|isim|öğrenci|ogrenci|name)/.test(x)&&!/soyad/.test(x));
    const soyad=h.findIndex(x=>/soyad/.test(x));
    if(adi>=0){ cols=soyad>=0?[adi,soyad]:[adi]; }
    else cols=[0];
  } else {
    // no header: pick the column with the most non-numeric text values
    const score={};
    rows.forEach(r=>(r||[]).forEach((c,ci)=>{ const s=String(c).trim(); if(s && isNaN(Number(s.replace(',','.')))) score[ci]=(score[ci]||0)+1; }));
    const best=Object.entries(score).sort((a,b)=>b[1]-a[1])[0];
    cols=[best?+best[0]:0];
  }
  const out=[];
  for(let i=start;i<rows.length;i++){
    const r=rows[i]||[];
    const v=cols.map(c=>r[c]==null?'':String(r[c]).trim()).filter(Boolean).join(' ').trim();
    if(v) out.push(v);
  }
  return out;
}
/* {group,name} pairs from a bulk file */
function extractGroupStudents(rows){
  if(!rows.length) return [];
  const h=(rows[0]||[]).map(c=>norm(String(c)));
  const hasHeader=h.some(isHeaderText);
  let start=0, gc=0, nc=[1];
  if(hasHeader){
    start=1;
    const g=h.findIndex(x=>/(grup|sınıf|sinif|class|group)/.test(x));
    const adi=h.findIndex(x=>/(ad|adı|adi|isim|öğrenci|ogrenci|name)/.test(x)&&!/soyad/.test(x));
    const soyad=h.findIndex(x=>/soyad/.test(x));
    gc=g>=0?g:0;
    if(adi>=0) nc=soyad>=0?[adi,soyad]:[adi];
    else nc=[gc===0?1:0];
  }
  const out=[];
  for(let i=start;i<rows.length;i++){
    const r=rows[i]||[];
    const gname=String(r[gc]==null?'':r[gc]).trim();
    const nm=nc.map(c=>r[c]==null?'':String(r[c]).trim()).filter(Boolean).join(' ').trim();
    if(gname&&nm) out.push({group:gname,name:nm});
  }
  return out;
}
async function handleStudentFile(file){
  if(!file) return;
  const g=group(importTargetGroup); if(!g){ alert('Hedef grup bulunamadı.'); return; }
  try{
    const names=extractNames(await readRows(file));
    if(!names.length){ alert('Dosyada öğrenci adı bulunamadı. İsimler ilk sütunda (veya "Ad/Ad Soyad" başlıklı sütunda) olmalı.'); return; }
    names.forEach(n=>g.students.push({id:uid(),name:n}));
    saveState(); render();
    alert(names.length+' öğrenci "'+g.name+'" grubuna eklendi.');
  }catch(e){ alert(e.message||'Dosya okunamadı.'); }
}
async function handleBulkFile(file){
  if(!file) return;
  try{
    const pairs=extractGroupStudents(await readRows(file));
    if(!pairs.length){ alert('Dosyada veri bulunamadı. İki sütun bekleniyor: Grup ve Ad Soyad.'); return; }
    let added=0, created=0;
    pairs.forEach(p=>{
      let g=state.groups.find(x=>norm(x.name)===norm(p.group));
      if(!g){ g={id:uid(),name:p.group,advisor:'',color:COLORS[state.groups.length%COLORS.length],students:[],schedule:{}}; state.groups.push(g); created++; }
      g.students.push({id:uid(),name:p.name}); added++;
    });
    activeGroupId=activeGroupId||state.groups[0].id;
    saveState(); render();
    alert(added+' öğrenci eklendi'+(created?(' · '+created+' yeni grup oluşturuldu'):'')+'.');
  }catch(e){ alert(e.message||'Dosya okunamadı.'); }
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='yaz-donemi-yedek.json'; a.click(); URL.revokeObjectURL(url);
}
function importJSON(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
    if(!d.groups||!d.days||!d.periods) throw new Error('format');
    if(!d.periods||!d.periods.length) d.periods=defaultState().periods;
    d.groups.forEach(g=>{ if(!Array.isArray(g.periods)||!g.periods.length){ g.periods=(d.periods||[]).map(p=>({label:p.label,time:p.time})); } });
    state=d; activeGroupId=state.groups[0]?state.groups[0].id:null; undoStack=[]; saveState(); render();
    alert('Yedek başarıyla yüklendi.');
  }catch(err){ alert('Dosya okunamadı veya geçerli bir yedek değil.'); } };
  r.readAsText(file);
}

/* ---------------- embed API (React parent iframe) ---------------- */
function exportSnapshot(){ return JSON.parse(JSON.stringify(state)); }
function importSnapshot(d){
  if(!d||typeof d!=='object') return false;
  state=d;
  if(!state.periods||!state.periods.length) state.periods=defaultState().periods;
  state.groups.forEach(g=>{ if(!Array.isArray(g.periods)||!g.periods.length){ g.periods=(state.periods||[]).map(p=>({label:p.label,time:p.time})); } });
  activeGroupId=state.groups[0]?state.groups[0].id:null;
  undoStack=[]; saveState(); render(); return true;
}
window.addEventListener('message', (ev)=>{
  const msg=ev.data;
  if(!msg||typeof msg!=='object'||msg.source!=='scs-planner-parent') return;
  const reply=(payload)=>{ try{ ev.source.postMessage(Object.assign({source:'scs-planner-embed',requestId:msg.requestId}, payload), ev.origin||'*'); }catch(e){} };
  if(msg.type==='GET_STATE') reply({type:'STATE', payload: exportSnapshot()});
  else if(msg.type==='SET_STATE') reply({type:'SET_OK', ok: importSnapshot(msg.payload)});
  else if(msg.type==='PING') reply({type:'PONG'});
});
if(window.parent!==window){ try{ window.parent.postMessage({source:'scs-planner-embed', type:'READY'}, '*'); }catch(e){} }

/* ---------------- go ---------------- */
render();
